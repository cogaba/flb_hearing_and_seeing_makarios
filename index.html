<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<title>The Reading Room</title>
<meta name="description" content="A church library of Dag Heward-Mills books to read offline." />
<meta name="theme-color" content="#1b2130" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Reading Room" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icons/icon-180.png" />
<link rel="icon" href="icons/icon-192.png" />
<link rel="stylesheet" href="styles.css?v=3" />
</head>
<body>
<!-- ===== Library view ===== -->
<header class="masthead">
  <div class="mast-inner">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M12 4.2c-1.8-1-4-1.5-6.2-1.5-1 0-2 .1-3 .3v15.4c1-.2 2-.3 3-.3 2.2 0 4.4.5 6.2 1.5 1.8-1 4-1.5 6.2-1.5 1 0 2 .1 3 .3V3c-1-.2-2-.3-3-.3-2.2 0-4.4.5-6.2 1.5Zm0 0v15.6" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linejoin="round"/></svg>
      </span>
      <div>
        <h1 class="brand-name">The Reading Room</h1>
        <p class="brand-sub">Books by Dag&nbsp;Heward-Mills &middot; free to read</p>
      </div>
    </div>
    <div class="offline-pill" id="offlinePill" hidden>Offline &middot; saved books available</div>
  </div>
  <div class="controls">
    <label class="search" aria-label="Search books">
      <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" d="m20 20-3.2-3.2M11 18a7 7 0 1 0 0-14 7 7 0 0 0 0 14Z"/></svg>
      <input id="search" type="search" placeholder="Search by title or subject" autocomplete="off" />
    </label>
    <div class="chips" id="chips" role="tablist" aria-label="Collections"></div>
  </div>
</header>

<main id="shelf" class="shelf" aria-live="polite"></main>

<footer class="foot">
  <button id="saveAll" class="save-all" type="button">Save all books for offline</button>
  <p class="foot-note" id="footNote">Tap a book to read. Add this page to your Home Screen for a full-screen library.</p>
</footer>

<!-- ===== Reader view ===== -->
<section id="reader" class="reader" hidden aria-modal="true" role="dialog">
  <div class="reader-bar">
    <button class="rbtn" id="rClose" type="button" aria-label="Back to library">
      <svg viewBox="0 0 24 24" width="22" height="22"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M15 5l-7 7 7 7"/></svg>
      <span>Library</span>
    </button>
    <div class="reader-title" id="rTitle"></div>
    <div class="reader-tools">
      <button class="rbtn icon" id="rFontMinus" type="button" aria-label="Smaller text">A&minus;</button>
      <button class="rbtn icon" id="rFontPlus" type="button" aria-label="Larger text">A+</button>
      <button class="rbtn icon" id="rTheme" type="button" aria-label="Change background">◐</button>
      <a class="rbtn icon" id="rBooks" type="button" aria-label="Open in Apple Books" href="#" download>Books</a>
    </div>
  </div>
  <div class="reader-stage">
    <button class="page-arrow left" id="rPrev" type="button" aria-label="Previous page">‹</button>
    <div id="viewer" class="viewer"></div>
    <button class="page-arrow right" id="rNext" type="button" aria-label="Next page">›</button>
  </div>
  <div class="reader-progress"><div id="rBar"></div></div>
</section>

<div id="toast" class="toast" hidden></div>

<script src="vendor/jszip.min.js"></script>
<script src="vendor/epub.min.js"></script>
<script src="app.js?v=6"></script>
</body>
</html>
